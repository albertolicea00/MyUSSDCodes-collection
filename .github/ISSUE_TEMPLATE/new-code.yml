name: New code proposal
description: Propose a USSD code (or a whole collection) to add to the catalog.
title: "[new code]: "
labels: ["new-code"]
body:
  - type: input
    id: name
    attributes:
      label: Code name
      description: Short human-readable name.
      placeholder: Check balance
    validations:
      required: true
  - type: input
    id: code
    attributes:
      label: Dial string
      description: Use `{placeholders}` for variable parts.
      placeholder: "*234*{number}*{amount}#"
    validations:
      required: true
  - type: input
    id: carrier
    attributes:
      label: Carrier / country
      description: Leave empty if the code is carrier-independent.
      placeholder: Movistar — ES
  - type: textarea
    id: description
    attributes:
      label: What does it do?
    validations:
      required: true
  - type: input
    id: source
    attributes:
      label: Source
      description: Carrier page URL, GSM spec, or device/plan where you tested it.
    validations:
      required: true
  - type: checkboxes
    id: dangerous
    attributes:
      label: Risk
      options:
        - label: This code can lock a SIM, erase settings or cost money (must be marked `dangerous`).
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing collections and this code is not already in the catalog.
          required: true
