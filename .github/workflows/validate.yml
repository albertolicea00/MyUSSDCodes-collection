name: Validate collections

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate catalog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate collections
        run: node scripts/validate.js
